<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explore a Pokédex online com lista completa de Pokémon, busca por nome e navegação paginada. Projeto desenvolvido em HTML5, CSS3 e JavaScript.">
    <meta name="keywords" content="Pokémon, Pokédex, lista de Pokémon, busca Pokémon, HTML5, CSS3, JavaScript">
    <meta name="author" content="Edson Alves">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#fff">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Pokédex Online - Lista Completa de Pokémon">
    <meta property="og:description" content="Busque Pokémon pelo nome e navegue pela Pokédex online completa.">
    <meta property="og:image" content="assets/img/logo/pokemon-logo.svg">
    <meta property="og:url" content="https://seudominio.com/">
    <meta property="og:locale" content="pt_BR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pokédex Online - Lista Completa de Pokémon">
    <meta name="twitter:description" content="Busque Pokémon pelo nome e navegue pela Pokédex online completa.">
    <meta name="twitter:image" content="assets/img/logo/pokemon-logo.svg">

    <title>Pokédex Online | Lista Completa de Pokémon</title>

    <!-- Fonte - Inter - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Fonte - DM Sans - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/img/favicon/pokebola.ico" type="image/x-icon">

    <!-- Estilos - CSS3 -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Responsive - CSS3 -->
    <link rel="stylesheet" href="assets/css/base/responsive.css">

</head>

<body>
    <main class="layout">
        <header class="header">
            <a href="/" class="header__logo">
                <img src="assets/img/logo/pokemon-logo.svg" alt="Logo Pokémon" width="124" height="39">
            </a>

            <nav class="header__nav" aria-label="Menu principal">

                <button class="header__menu--icon" aria-label="Abrir Pesquisa" id="btn-search">
                    <img src="assets/img/icons/search.svg" alt="Pesquisar" aria-hidden="true">
                </button>

                <button class="header__menu--icon" aria-label="Abrir menu" id="btn-menu">
                    <img src="assets/img/icons/menu.svg" alt="menu" aria-hidden="true">
                </button>

                <ul class="header__list">
                    <button class="header__menu--icon header__menu--close" aria-label="Fechar pesquisar Pokémon">
                        <img src="assets/img/icons/close.svg" alt="Fechar pesquisar Pokémon" aria-hidden="true">
                    </button>
                    <li class="header__item home">
                        <a href="/" class="header__link">Home</a>
                    </li>
                    <li class="header__item">
                        <a href="pokedex.html" class="header__link">Pokédex</a>
                    </li>
                </ul>
            </nav>
        </header>

        <section class="search">
            <button class="header__menu--icon header__search--close" aria-label="Fechar menu">
                <img src="assets/img/icons/close.svg" alt="Fechar menu" aria-hidden="true">
            </button>
            <div class="search__field">
                <h1 class="search__title">Qual Pokémon você quer capturar hoje?</h1>
                <input type="text" id="pokemon-search" name="pokemon" class="search__input"
                    placeholder="Faça uma busca pelo nome do pokémon">

                <img src="assets/img/icons/search.svg" alt="" aria-hidden="true" class="search__icon">

                <button class="search__btn" type="button">
                    Buscar
                </button>
            </div>
        </section>

        <section class="list__cards">
            <!-- Renderiza a Lista de Pokemons -->
        </section>
        <footer>
            <div class="pagination">
                <!-- Renderiza a Paginação -->
            </div>
        </footer>
    </main>
    <!-- Script JS Principal -->
    <script src="assets/js/main.js" defer type="module"></script>
</body>

</html>
